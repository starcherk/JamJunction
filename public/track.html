<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track — JamJunction</title>
    <script>
      const b = window.location.pathname.startsWith("/JamJunction") ? "/JamJunction/" : "/";
      document.write('<base href="' + b + '">');
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
            <circle cx="20" cy="20" r="6"  fill="currentColor"/>
            <path d="M20 2 A18 18 0 0 1 38 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 2 A18 18 0 0 0 2 20"  stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".4"/>
          </svg>
          <span class="logo-text">JamJunction</span>
        </div>
        <p class="tagline">Music collaboration, together.</p>
        <button class="sign-out-btn" id="sign-out-btn" title="Sign out">Sign Out</button>
      </div>
    </header>

    <main class="main-content">

      <!-- ── Back link ─────────────────────────────────────────── -->
      <a id="back-link" class="back-link" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 0 1 1.04 1.08l-4.158 3.96H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd"/>
        </svg>
        Back to Library
      </a>

      <!-- ── Loading state ─────────────────────────────────────── -->
      <div id="track-loading" class="loading-state" aria-live="polite">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>

      <!-- ── Track detail ──────────────────────────────────────── -->
      <section class="section track-detail hidden" id="track-detail">

        <!-- Title (editable) -->
        <div class="track-title-row">
          <input
            type="text"
            id="track-name-input"
            class="track-name-input"
            aria-label="Track name"
          />
          <button class="btn-save hidden" id="save-name-btn">Save</button>
        </div>

        <div class="track-meta-row" id="track-meta"></div>


        <!-- Player card -->
        <div class="player-card" id="player-card">
          <div class="player-card-timeline" id="player-timeline">
            <div class="timeline-markers" id="timeline-markers"></div>
          </div>
          <audio id="audio-player" controls preload="none" class="player-card-audio" crossorigin="anonymous"></audio>
        </div>

        <!-- Branch lineage -->
        <div id="track-lineage" class="track-lineage hidden"></div>

        <!-- Audio Editor -->
        <div id="editor-panel" class="editor-panel">
          <!-- Visualizer stacked above waveform -->
          <canvas id="visualizer-canvas" class="player-card-canvas" aria-hidden="true"></canvas>

          <!-- Waveform with trim handles -->
          <div class="editor-waveform-wrap" id="editor-waveform-wrap">
            <canvas id="editor-waveform" class="editor-waveform"></canvas>
            <div class="editor-handle editor-handle-left" id="editor-handle-left">
              <div class="editor-handle-grip"></div>
            </div>
            <div class="editor-handle editor-handle-right" id="editor-handle-right">
              <div class="editor-handle-grip"></div>
            </div>
            <div class="editor-trim-overlay editor-trim-left" id="editor-trim-left"></div>
            <div class="editor-trim-overlay editor-trim-right" id="editor-trim-right"></div>
            <div class="editor-fade-overlay editor-fade-in" id="editor-fade-in-overlay"></div>
            <div class="editor-fade-overlay editor-fade-out" id="editor-fade-out-overlay"></div>
            <div class="editor-playhead" id="editor-playhead"></div>
          </div>

          <div class="editor-time-row">
            <span id="editor-trim-start-label">0:00</span>
            <span id="editor-duration-label">—</span>
            <span id="editor-trim-end-label">0:00</span>
          </div>

          <!-- Controls -->
          <div class="editor-controls">
            <div class="editor-control-group">
              <label class="editor-label">Fade In</label>
              <input type="range" id="editor-fade-in" class="editor-slider" min="0" max="10" step="0.1" value="0" />
              <span class="editor-value" id="editor-fade-in-val">0.0s</span>
            </div>
            <div class="editor-control-group">
              <label class="editor-label">Fade Out</label>
              <input type="range" id="editor-fade-out" class="editor-slider" min="0" max="10" step="0.1" value="0" />
              <span class="editor-value" id="editor-fade-out-val">0.0s</span>
            </div>
            <div class="editor-control-group">
              <label class="editor-label">Volume</label>
              <input type="range" id="editor-volume" class="editor-slider" min="0" max="200" step="1" value="100" />
              <span class="editor-value" id="editor-volume-val">100%</span>
            </div>
          </div>

          <!-- Branch name -->
          <div class="editor-branch-name" id="editor-branch-name-row">
            <label class="editor-label" for="editor-branch-input">Branch Name</label>
            <input type="text" id="editor-branch-input" class="editor-branch-input" placeholder="e.g. louder intro, trimmed outro…" maxlength="100" />
          </div>

          <!-- Editor actions -->
          <div class="editor-actions">
            <button class="btn-editor btn-editor-preview" id="editor-preview-btn">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
                <path d="M6.3 2.84A1.5 1.5 0 0 0 4 4.11v11.78a1.5 1.5 0 0 0 2.3 1.27l9.344-5.891a1.5 1.5 0 0 0 0-2.538L6.3 2.841Z"/>
              </svg>
              Preview
            </button>
            <button class="btn-editor btn-editor-reset" id="editor-reset-btn">Reset</button>
            <button class="btn-editor btn-editor-branch" id="editor-branch-btn">
              <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14" aria-hidden="true">
                <path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25Z"/>
              </svg>
              Branch
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="track-actions">
          <a id="download-link" class="btn-action" download>
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"/>
              <path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"/>
            </svg>
            Download
          </a>

          <button class="btn-action btn-danger" id="delete-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd"/>
            </svg>
            Delete Track
          </button>
        </div>

        <!-- Timestamped comments -->
        <div class="comments-section">
          <div class="comments-header-row">
            <h3 class="section-title">Comments</h3>
            <button class="btn-comment-stamp" id="editor-stamp-btn" title="Stamp editor selection as timestamp">
              <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14" aria-hidden="true">
                <path d="M3.505 2.365A41.369 41.369 0 0 1 9 2c1.863 0 3.697.124 5.495.365 1.247.167 2.18 1.108 2.435 2.268a4.45 4.45 0 0 0-.577-.069 43.096 43.096 0 0 0-4.853-.27 43.096 43.096 0 0 0-4.853.27c-.2.015-.394.04-.577.069.255-1.16 1.187-2.1 2.435-2.268ZM10.5 6a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0ZM2.25 8a.75.75 0 0 0 0 1.5h.75v2.25a.75.75 0 0 0 1.5 0V9.5h11v2.25a.75.75 0 0 0 1.5 0V9.5h.75a.75.75 0 0 0 0-1.5H2.25ZM10 4.5a41.826 41.826 0 0 0-4.665.26c-.756.1-1.335.694-1.335 1.49v.5h12v-.5c0-.796-.58-1.39-1.335-1.49A41.826 41.826 0 0 0 10 4.5ZM4.335 13.19A.75.75 0 0 0 3.75 14v1.5A2.25 2.25 0 0 0 6 17.75h8a2.25 2.25 0 0 0 2.25-2.25V14a.75.75 0 0 0-.585-.81L10 12l-5.665 1.19Z"/>
              </svg>
              Stamp
            </button>
          </div>
          <div class="comment-form">
            <div class="comment-time-badge hidden" id="comment-time-badge">
              <span id="comment-time-label">0:00</span>
              <button class="comment-time-clear" id="comment-time-clear" aria-label="Remove timestamp">&times;</button>
            </div>
            <div class="comment-input-row">
              <input
                type="text"
                id="comment-input"
                class="comment-input"
                placeholder="Add a comment…"
                maxlength="500"
                aria-label="Add comment"
              />
              <button class="btn-comment-submit" id="comment-submit" disabled>Post</button>
            </div>
            <p class="comment-hint">Click the player timeline or use Stamp to pin a timestamp from the editor.</p>
          </div>
          <ul class="comments-list" id="comments-list"></ul>
          <p class="comments-empty hidden" id="comments-empty">No comments yet.</p>
        </div>

        <!-- Activity feed -->
        <div class="activity-section">
          <h3 class="section-title">Activity</h3>
          <ul class="activity-list" id="activity-list"></ul>
          <p class="activity-empty hidden" id="activity-empty">No activity yet.</p>
        </div>

      </section>
    </main>

    <!-- ── Notification toast ─────────────────────────────────────── -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="track.js" type="module"></script>
  </body>
</html>
