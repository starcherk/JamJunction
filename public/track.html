<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track — JamJunction</title>
    <script>
      const b = window.location.pathname.startsWith("/JamJunction") ? "/JamJunction/" : "/";
      document.write('<base href="' + b + '">');
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
            <circle cx="20" cy="20" r="6"  fill="currentColor"/>
            <path d="M20 2 A18 18 0 0 1 38 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 2 A18 18 0 0 0 2 20"  stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".4"/>
          </svg>
          <span class="logo-text">JamJunction</span>
        </div>
        <p class="tagline">Music collaboration, together.</p>
        <button class="sign-out-btn" id="sign-out-btn" title="Sign out">Sign Out</button>
      </div>
    </header>

    <main class="main-content">

      <!-- ── Back link ─────────────────────────────────────────── -->
      <a id="back-link" class="back-link" href="/">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 0 1 1.04 1.08l-4.158 3.96H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd"/>
        </svg>
        Back to Library
      </a>

      <!-- ── Loading state ─────────────────────────────────────── -->
      <div id="track-loading" class="loading-state" aria-live="polite">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>

      <!-- ── Track detail ──────────────────────────────────────── -->
      <section class="section track-detail hidden" id="track-detail">

        <!-- Title (editable) -->
        <div class="track-title-row">
          <input
            type="text"
            id="track-name-input"
            class="track-name-input"
            aria-label="Track name"
          />
          <button class="btn-save hidden" id="save-name-btn">Save</button>
        </div>

        <div class="track-meta-row" id="track-meta"></div>

        <!-- Tags -->
        <div class="track-tags-section">
          <div class="tags-list" id="tags-list"></div>
          <div class="tag-input-row">
            <input
              type="text"
              id="tag-input"
              class="tag-input"
              placeholder="Add a tag…"
              maxlength="30"
              aria-label="Add tag"
            />
          </div>
        </div>

        <!-- Description -->
        <div class="track-description-section">
          <textarea
            id="description-input"
            class="description-input"
            placeholder="Add notes or a description…"
            maxlength="500"
            rows="3"
            aria-label="Description"
          ></textarea>
          <button class="btn-save-desc hidden" id="save-desc-btn">Save Notes</button>
        </div>

        <!-- Player card with integrated visualizer -->
        <div class="player-card" id="player-card">
          <canvas id="visualizer-canvas" class="player-card-canvas" aria-hidden="true"></canvas>
          <div class="player-card-timeline" id="player-timeline">
            <div class="timeline-markers" id="timeline-markers"></div>
          </div>
          <audio id="audio-player" controls preload="none" class="player-card-audio" crossorigin="anonymous"></audio>
        </div>

        <!-- Actions -->
        <div class="track-actions">
          <a id="download-link" class="btn-action" download>
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z"/>
              <path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z"/>
            </svg>
            Download
          </a>
          <label class="btn-action" id="replace-label">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H4.28a.75.75 0 0 0-.75.75v3.952a.75.75 0 0 0 1.5 0v-2.146l.312.311a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.394Zm-10.624-2.85a5.5 5.5 0 0 1 9.201-2.465l.312.31H11.77a.75.75 0 0 0 0 1.5h3.951a.75.75 0 0 0 .75-.75V3.217a.75.75 0 0 0-1.5 0v2.146l-.311-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.449.386Z" clip-rule="evenodd"/>
            </svg>
            Replace File
            <input type="file" id="replace-input" accept="audio/*" class="visually-hidden" />
          </label>
          <button class="btn-action" id="record-replace-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path d="M10 1a3.5 3.5 0 0 0-3.5 3.5v5a3.5 3.5 0 0 0 7 0v-5A3.5 3.5 0 0 0 10 1Z"/>
              <path d="M16 9.5a.75.75 0 0 0-1.5 0v.5a4.5 4.5 0 0 1-9 0v-.5a.75.75 0 0 0-1.5 0v.5a6 6 0 0 0 5.25 5.954V18h-2a.75.75 0 0 0 0 1.5h5.5a.75.75 0 0 0 0-1.5h-2v-2.046A6 6 0 0 0 16 10v-.5Z"/>
            </svg>
            Record Replace
          </button>
          <button class="btn-action btn-danger" id="delete-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd"/>
            </svg>
            Delete Track
          </button>
        </div>

        <!-- Timestamped comments -->
        <div class="comments-section">
          <h3 class="section-title">Comments</h3>
          <div class="comment-form">
            <div class="comment-time-badge hidden" id="comment-time-badge">
              <span id="comment-time-label">0:00</span>
              <button class="comment-time-clear" id="comment-time-clear" aria-label="Remove timestamp">&times;</button>
            </div>
            <div class="comment-input-row">
              <input
                type="text"
                id="comment-input"
                class="comment-input"
                placeholder="Add a comment…"
                maxlength="500"
                aria-label="Add comment"
              />
              <button class="btn-comment-submit" id="comment-submit" disabled>Post</button>
            </div>
            <p class="comment-hint">Click the timeline bar above the player to pin a comment to a timestamp.</p>
          </div>
          <ul class="comments-list" id="comments-list"></ul>
          <p class="comments-empty hidden" id="comments-empty">No comments yet. Be the first!</p>
        </div>

        <!-- Activity feed -->
        <div class="activity-section">
          <h3 class="section-title">Activity</h3>
          <ul class="activity-list" id="activity-list"></ul>
          <p class="activity-empty hidden" id="activity-empty">No activity yet.</p>
        </div>

        <!-- Recording panel (for record-replace) -->
        <div id="record-panel" class="record-panel hidden">
          <div class="record-panel-header">
            <span class="record-panel-title">Record Replacement</span>
            <button class="record-cancel-btn" id="record-cancel-btn" aria-label="Cancel recording">&times;</button>
          </div>
          <canvas id="record-level-canvas" class="record-level-canvas" aria-hidden="true"></canvas>
          <div class="record-timer" id="record-timer">0:00</div>
          <div class="record-controls">
            <button class="record-btn record-btn-start" id="record-start-btn">
              <span class="record-dot"></span> Record
            </button>
            <button class="record-btn record-btn-stop hidden" id="record-stop-btn">
              <span class="record-stop-icon"></span> Stop
            </button>
          </div>
          <div class="record-preview hidden" id="record-preview">
            <audio id="record-preview-audio" controls class="record-preview-audio"></audio>
            <div class="record-preview-actions">
              <button class="record-btn record-btn-upload" id="record-upload-btn">Upload as Replacement</button>
              <button class="record-btn record-btn-discard" id="record-discard-btn">Discard</button>
            </div>
          </div>
        </div>

      </section>
    </main>

    <!-- ── Notification toast ─────────────────────────────────────── -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="track.js" type="module"></script>
  </body>
</html>
